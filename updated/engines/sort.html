<!DOCTYPE html>
<html>
<head>
<title>Sort Engine - MIS</title>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#e3ebf6);
    padding: 20px;
}

/* HEADER */
.header {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    margin-bottom: 20px;
    text-align: center;
}

.header h2 {
    margin: 0;
    font-weight: 800;
    color: #1f2d3d;
}

.header p {
    color: #6c7a89;
    margin: 8px 0 15px;
}

/* BACK BUTTON */
.nav a {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 8px;
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color: white;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.nav a:hover {
    transform: scale(1.05);
}

/* UPLOAD BOX */
.upload-box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    text-align: center;
}

input[type="file"] {
    margin-top: 10px;
    padding: 10px;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px 18px;
    border: none;
    background: linear-gradient(135deg,#2ecc71,#6ee7b7);
    color: white;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 600;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg,#27ae60,#4ade80);
}

/* FILE LIST */
.file-list {
    margin-top: 25px;
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.file {
    background: linear-gradient(135deg,#3498db,#2980b9);
    color: white;
    padding: 8px 10px;
    margin: 6px 0;
    font-size: 12px;
    border-radius: 6px;
    display: flex;
    justify-content: space-between;
}

/* RESULT */
#result {
    margin-top: 20px;
    text-align: center;
    font-weight: 600;
}

/* TABLE */
table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

th, td {
    border: 1px solid #eee;
    padding: 8px;
    font-size: 12px;
    text-align: center;
}

th {
    background: #2c3e50;
    color: white;
}
</style>
</head>

<body>

<div class="header">
    <h2>⚙️ SORT ENGINE</h2>
    <p>Upload files • Apply smart sorting • Download sorted ZIP</p>

    <div class="nav">
        <!-- ✅ FIXED HERE -->
        <a href="/">
            <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
    </div>
</div>

<div class="upload-box">

    <form id="sortForm">
        <input type="file" id="files" multiple required>
        <br>
        <button type="submit">
            <i class="bi bi-upload"></i> Upload & Sort
        </button>
    </form>

</div>

<div class="file-list" id="fileList">
    <h4>📁 Uploaded Files Preview</h4>
    <p>No files uploaded yet</p>
</div>

<div id="result"></div>

<script>

document.getElementById("sortForm").onsubmit = async function(e){
    e.preventDefault();

    let form = new FormData();
    let files = document.getElementById("files").files;

    if(files.length === 0){
        alert("Please select files");
        return;
    }

    for(let f of files){
        form.append("files", f);
    }

    document.getElementById("result").innerHTML =
        "<p>⏳ Processing files...</p>";

    try {
        let res = await fetch("/sort-upload", {
            method: "POST",
            body: form
        });

        if(!res.ok) throw new Error("Upload failed");

        let blob = await res.blob();

        let url = window.URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = "sorted_output.zip";
        document.body.appendChild(a);
        a.click();
        a.remove();

        document.getElementById("result").innerHTML =
            "<p style='color:green;'>✅ Sorting completed & downloaded</p>";

    } catch(err){
        document.getElementById("result").innerHTML =
            "<p style='color:red;'>❌ Error: " + err.message + "</p>";
    }
};

</script>

</body>
</html>
