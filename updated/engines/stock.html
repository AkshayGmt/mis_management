<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Count</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-box {
            max-width: 600px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            background: white;
        }

        .title {
            font-weight: 700;
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .sub-text {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .upload-box {
            border: 2px dashed #3498db;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            background: #f8fbff;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #eef6ff;
        }

        .btn-process {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="title">?? Stock Count</div>
    <div class="sub-text">Upload Excel/CSV files to generate stock analysis report</div>

    <form action="/stock-upload" method="post" enctype="multipart/form-data">

        <div class="upload-box">
            <p class="mb-2">?? Drag & Drop Files or Click Below</p>
            <input class="form-control" type="file" name="files" multiple>
        </div>

        <button class="btn btn-primary btn-process">
            ?? Process Stock Data
        </button>

    </form>

    <a class="back-link" href="/">? Back to Dashboard</a>

</div>

</body>
</html>
