<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Count</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #e3ebf6);
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            max-width: 600px;
            margin: 80px auto;
            padding: 35px 30px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            background: white;
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .title {
            font-weight: 800;
            font-size: 30px;
            text-align: center;
            margin-bottom: 10px;
            color: #1f2d3d;
        }

        .sub-text {
            text-align: center;
            color: #6c7a89;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .upload-box {
            border: 2px dashed #4da3ff;
            padding: 30px 20px;
            border-radius: 14px;
            text-align: center;
            background: #f8fbff;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-box:hover {
            background: #eef6ff;
            border-color: #2d8cff;
        }

        .upload-box i {
            font-size: 40px;
            color: #3498db;
            margin-bottom: 10px;
        }

        .upload-box p {
            margin-bottom: 10px;
            color: #5d6d7e;
            font-weight: 500;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        .btn-process {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            background: linear-gradient(135deg, #3498db, #6dd5fa);
            border: none;
            transition: 0.3s;
        }

        .btn-process:hover {
            background: linear-gradient(135deg, #2d8cff, #4facfe);
            transform: scale(1.02);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #3498db;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #1d6fdc;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="title">📦 Stock Count</div>
    <div class="sub-text">Upload Excel/CSV files to generate stock analysis report</div>

    <form action="/stock-upload" method="post" enctype="multipart/form-data">

        <div class="upload-box">
            <i class="bi bi-cloud-arrow-up"></i>
            <p>Drag & Drop Files or Click Below</p>
            <input class="form-control" type="file" name="files" multiple>
        </div>

        <button class="btn btn-primary btn-process">
            <i class="bi bi-gear"></i> Process Stock Data
        </button>

    </form>

    <a class="back-link" href="/">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>

</div>

</body>
</html>
