<!DOCTYPE html>
<html>
<head>
<title>MIS Combine System</title>

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#eef2f7,#e3ebf6);
    padding:20px;
}

/* HEADER */
h2 {
    text-align:center;
    color:#1f2d3d;
    font-weight:800;
    margin-bottom:20px;
}

/* PANEL */
.panel {
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    margin-bottom:25px;
    text-align:center;
}

select, input {
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    margin:5px;
    font-size:14px;
}

/* BUTTONS */
button {
    margin:8px;
    padding:10px 16px;
    border:none;
    border-radius:8px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button[type="submit"] {
    background: linear-gradient(135deg,#3498db,#6dd5fa);
    color:white;
}

button[type="submit"]:hover {
    transform:scale(1.05);
}

button[type="button"] {
    background: linear-gradient(135deg,#9b59b6,#c084fc);
    color:white;
}

button[type="button"]:hover {
    transform:scale(1.05);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap:20px;
}

/* BOX */
.box {
    background:white;
    border-radius:15px;
    padding:15px;
    min-height:170px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    transition:0.3s;
    position:relative;
}

.box:hover {
    transform: translateY(-5px);
}

.box b {
    display:block;
    margin-bottom:10px;
    color:#2c3e50;
}

/* FILE */
.file {
    background: linear-gradient(135deg,#3498db,#2980b9);
    color:white;
    padding:8px 10px;
    margin:6px 0;
    cursor:grab;
    font-size:12px;
    display:flex;
    justify-content:space-between;
    border-radius:8px;
    align-items:center;
    transition:0.2s;
}

.file:hover {
    transform:scale(1.02);
}

.file button {
    background:#e74c3c;
    border:none;
    color:white;
    padding:3px 6px;
    border-radius:4px;
    cursor:pointer;
}

.file button:hover {
    background:#c0392b;
}

/* TABLE */
table {
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

th, td {
    border:1px solid #eee;
    padding:10px;
    font-size:12px;
    text-align:center;
}

th {
    background: linear-gradient(135deg,#2c3e50,#34495e);
    color:white;
}

/* HEADINGS */
h3 {
    margin-top:25px;
    color:#2c3e50;
}

h4 {
    margin-top:10px;
    color:#555;
}

/* LOADING */
.loading {
    text-align:center;
    font-weight:600;
    color:#555;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>💎 MIS COMBINE SYSTEM</h2>

<!-- CONTROL PANEL -->
<div class="panel">

<form id="uploadForm">

<select id="typeSelect">
    <option value="SOLD">SOLD</option>
    <option value="TOTAL">TOTAL</option>
    <option value="CURRENT">CURRENT</option>
    <option value="CUSTOM">➕ Custom</option>
</select>

<input type="text" id="customType"
       placeholder="Enter category"
       style="display:none;">

<br><br>

<input type="file" id="fileInput" multiple>

<br>

<button type="submit">
    <i class="bi bi-upload"></i> Upload Files
</button>

<button type="button" onclick="process()">
    <i class="bi bi-gear"></i> Start Combine
</button>

</form>

</div>

<!-- GRID AREA -->
<div id="app"></div>

<!-- TABLE AREA -->
<div id="tableArea"></div>

<script>

/* --- SAME JS (UNCHANGED) --- */

let files = [];

async function load(){
    let res = await fetch("/files");
    files = await res.json();
    render();
}

document.getElementById("typeSelect").onchange = function(){
    document.getElementById("customType").style.display =
        this.value === "CUSTOM" ? "inline-block" : "none";
};

function render(){

    let html = `<div class="grid">`;

    let types = [...new Set(files.map(f => f.type))];
    if(types.length === 0){
        types = ["SOLD","TOTAL","CURRENT"];
    }

    let kinds = ["DZ","FANCY"];

    types.forEach(t=>{
        kinds.forEach(k=>{

            html += `
            <div class="box"
                 ondrop="drop(event,'${t}','${k}')"
                 ondragover="allowDrop(event)">
                <b>📦 ${t} - ${k}</b>
            `;

            files.forEach(f=>{
                if(f.type==t && f.kind==k){
                    html += `
                    <div class="file"
                         draggable="true"
                         ondragstart="drag(event)"
                         id="${f.name}">
                        <span>${f.name}</span>
                        <button onclick="del('${f.name}')">X</button>
                    </div>`;
                }
            });

            html += `</div>`;
        });
    });

    html += `</div>`;
    document.getElementById("app").innerHTML = html;
}

function drag(ev){
    let el = ev.target.closest(".file");
    ev.dataTransfer.setData("text/plain", el.id);
}

function allowDrop(ev){ ev.preventDefault(); }

function drop(ev,type,kind){
    ev.preventDefault();
    let name = ev.dataTransfer.getData("text/plain");

    fetch("/move",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name,type,kind})
    }).then(load);
}

function del(name){
    fetch("/delete",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name})
    }).then(load);
}

document.getElementById("uploadForm").onsubmit = async (e)=>{
    e.preventDefault();

    let form = new FormData();

    let type =
        document.getElementById("typeSelect").value === "CUSTOM"
        ? document.getElementById("customType").value.trim()
        : document.getElementById("typeSelect").value;

    if(!type){
        alert("Enter category name");
        return;
    }

    form.append("type", type);

    let filesInput = document.getElementById("fileInput").files;

    for(let f of filesInput){
        form.append("files", f);
    }

    await fetch("/upload",{ method:"POST", body:form });

    e.target.reset();
    document.getElementById("customType").style.display = "none";

    load();
};

function process(){

    document.getElementById("tableArea").innerHTML =
        "<p class='loading'>⏳ Processing data...</p>";

    fetch("/process-preview")
    .then(res => res.json())
    .then(res => {

        let data = res.data;
        let html = "<h2>📊 Preview Result</h2>";

        for(let kind in data){

            html += `<h3>📁 ${kind}</h3>`;

            for(let loc in data[kind]){

                let rows = data[kind][loc];
                if(!rows.length) continue;

                html += `<h4>📍 ${loc}</h4>`;

                let cols = Object.keys(rows[0]);

                html += "<table><tr>";
                cols.forEach(c => html += `<th>${c}</th>`);
                html += "</tr>";

                rows.forEach(r=>{
                    html += "<tr>";
                    cols.forEach(c => html += `<td>${r[c]}</td>`);
                    html += "</tr>";
                });

                html += "</table>";
            }
        }

        document.getElementById("tableArea").innerHTML = html;

        let a = document.createElement("a");
        a.href = "/download";
        a.download = "MIS_Output.zip";
        a.click();

    })
    .catch(err=>{
        document.getElementById("tableArea").innerHTML =
            "<p style='color:red;'>Error: " + err.message + "</p>";
    });
}

load();

</script>

</body>
</html>
