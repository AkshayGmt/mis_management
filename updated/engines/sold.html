<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sold Count</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .card-box {
            max-width: 650px;
            margin: 80px auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 25px;
        }

        .upload-box {
            border: 2px dashed #e74c3c;
            padding: 25px;
            border-radius: 12px;
            background: #fff5f5;
            text-align: center;
            transition: 0.3s;
        }

        .upload-box:hover {
            background: #ffecec;
        }

        .btn-process {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-weight: 600;
            font-size: 16px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #555;
        }

        .icon {
            font-size: 40px;
            margin-bottom: 10px;
            color: #e74c3c;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="title">?? Sold Count</div>
    <div class="subtitle">Upload sold diamond files for analysis & grouping</div>

    <form action="/sold-upload" method="post" enctype="multipart/form-data">

        <div class="upload-box">
            <div class="icon">??</div>
            <p class="mb-2">Drag & Drop Files or Click to Upload</p>
            <input class="form-control" type="file" name="files" multiple>
        </div>

        <button class="btn btn-danger btn-process">
            ?? Process Sold Data
        </button>

    </form>

    <a class="back-link" href="/">? Back to Dashboard</a>

</div>

</body>
</html>
