<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sold Count</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #eef2f7, #fbe9e7);
            font-family: 'Segoe UI', sans-serif;
        }

        .card-box {
            max-width: 650px;
            margin: 80px auto;
            padding: 35px 30px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
        }

        .title {
            text-align: center;
            font-size: 30px;
            font-weight: 800;
            color: #1f2d3d;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #6c7a89;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .upload-box {
            border: 2px dashed #ff6b6b;
            padding: 30px 20px;
            border-radius: 14px;
            background: #fff5f5;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-box:hover {
            background: #ffecec;
            border-color: #e74c3c;
        }

        .icon {
            font-size: 42px;
            margin-bottom: 10px;
            color: #e74c3c;
        }

        .upload-box p {
            margin-bottom: 10px;
            color: #5d6d7e;
            font-weight: 500;
        }

        input[type="file"] {
            margin-top: 10px;
        }

        .btn-process {
            width: 100%;
            margin-top: 20px;
            padding: 13px;
            font-weight: 600;
            font-size: 16px;
            border-radius: 10px;
            background: linear-gradient(135deg, #e74c3c, #ff7675);
            border: none;
            transition: 0.3s;
        }

        .btn-process:hover {
            background: linear-gradient(135deg, #d63031, #ff5e5e);
            transform: scale(1.02);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            text-decoration: none;
            color: #e74c3c;
            font-weight: 500;
            transition: 0.2s;
        }

        .back-link:hover {
            color: #c0392b;
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="card-box">

    <div class="title">💰 Sold Count</div>
    <div class="subtitle">Upload sold diamond files for analysis & grouping</div>

    <form action="/sold-upload" method="post" enctype="multipart/form-data">

        <div class="upload-box">
            <div class="icon"><i class="bi bi-cash-stack"></i></div>
            <p>Drag & Drop Files or Click to Upload</p>
            <input class="form-control" type="file" name="files" multiple>
        </div>

        <button class="btn btn-danger btn-process">
            <i class="bi bi-gear"></i> Process Sold Data
        </button>

    </form>

    <a class="back-link" href="/">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
    </a>

</div>

</body>
</html>
