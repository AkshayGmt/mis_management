<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MIS Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-weight: 800;
            color: #2c3e50;
        }

        .header p {
            color: #7f8c8d;
        }

        .card-grid {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .dash-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: 0.3s;
            cursor: pointer;
        }

        .dash-card:hover {
            transform: translateY(-5px);
            background: #f8fbff;
        }

        .dash-card h3 {
            font-size: 20px;
            margin-top: 10px;
            color: #2c3e50;
        }

        .dash-card a {
            text-decoration: none;
            color: inherit;
        }

        .icon {
            font-size: 35px;
        }

        .stock { color: #3498db; }
        .sold { color: #e74c3c; }
        .combine { color: #9b59b6; }
        .sort { color: #2ecc71; }
        .graph { color: #f39c12; }
        .location { color: #1abc9c; }
    </style>
</head>

<body>

<div class="header">
    <h1>?? MIS DASHBOARD</h1>
    <p>Select a module to process your diamond data</p>
</div>

<div class="card-grid">

    <a href="/stock">
        <div class="dash-card">
            <div class="icon stock">??</div>
            <h3>Stock Count</h3>
        </div>
    </a>

    <a href="/sold">
        <div class="dash-card">
            <div class="icon sold">??</div>
            <h3>Sold Report</h3>
        </div>
    </a>

    <a href="/combine">
        <div class="dash-card">
            <div class="icon combine">??</div>
            <h3>Combine Data</h3>
        </div>
    </a>

    <a href="/sort">
        <div class="dash-card">
            <div class="icon sort">??</div>
            <h3>Sort Files</h3>
        </div>
    </a>

    <a href="/graph">
        <div class="dash-card">
            <div class="icon graph">??</div>
            <h3>Graph Analysis</h3>
        </div>
    </a>

    <a href="/location">
        <div class="dash-card">
            <div class="icon location">??</div>
            <h3>Location Wise</h3>
        </div>
    </a>

</div>

</body>
</html>
